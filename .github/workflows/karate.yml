name: Karate API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install task-api dependencies
        run: npm ci
        working-directory: apps/task-api

      - name: Start task-api
        run: node apps/task-api/server.js &

      - name: Wait for task-api to be ready
        run: npx wait-on http://localhost:3001/api/health --timeout 15000

      - name: Run Karate tests
        working-directory: karate
        run: mvn test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-report
          path: karate/target/karate-reports/
          retention-days: 30
