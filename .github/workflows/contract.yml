name: Contract Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install task-api dependencies
        run: npm ci
        working-directory: apps/task-api

      - name: Run consumer contract tests (generates pact)
        run: npm run test:contract:consumer

      - name: Run provider contract verification
        run: npm run test:contract:provider

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pact-file
          path: tests/contract/pacts/
          retention-days: 30
