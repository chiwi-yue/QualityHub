name: Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Install task-api dependencies
        run: npm ci
        working-directory: apps/task-api

      - name: Start task-api
        run: node apps/task-api/server.js &

      - name: Wait for task-api
        run: npx wait-on http://localhost:3001/api/health --timeout 15000

      # Smoke first — if the API is broken, load produces meaningless numbers
      - name: Run smoke test
        run: k6 run performance/smoke.js

      - name: Run load test
        run: k6 run performance/load.js

      # Stress test (performance/stress.js, up to 100 VUs) is intentionally excluded from CI.
      # It takes ~3 minutes and is designed to find breaking points, not validate SLOs —
      # running it on every push would add noise and cost without improving merge confidence.
      # Run manually: npm run perf:stress

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-summary
          path: performance/summary.json
          retention-days: 30
